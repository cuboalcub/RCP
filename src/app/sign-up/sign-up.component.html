<div class="signup-container hero-gradient">
  <!-- Back Button -->
  <button 
    (click)="goBack()"
    class="back-btn group"
    title="Regresar"
  >
    <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
  </button>

  <!-- Auth Card -->
  <div class="auth-card">
    <div class="text-center mb-8">
      <div class="inline-flex p-3 bg-indigo-50 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
        </svg>
      </div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Crea tu cuenta</h1>
      <p class="text-slate-500 font-medium">Únete a nuestra plataforma hoy mismo</p>
    </div>

    <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="md:col-span-2">
        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Correo Electrónico</label>
        <input 
          [(ngModel)]="email" 
          name="email" 
          type="email" 
          placeholder="tu@correo.com" 
          class="input-field"
          required>
      </div>

      <div class="md:col-span-2">
        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Nombre de Usuario</label>
        <input 
          [(ngModel)]="username" 
          name="username" 
          type="text" 
          placeholder="Usuario123" 
          class="input-field"
          required>
      </div>
      
      <div>
        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Contraseña</label>
        <input 
          [(ngModel)]="password" 
          name="password" 
          type="password" 
          placeholder="••••••••" 
          class="input-field"
          required>
      </div>

      <div>
        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Confirmar</label>
        <input 
          [(ngModel)]="confirmPassword" 
          name="confirm-password" 
          type="password" 
          placeholder="••••••••" 
          class="input-field"
          required>
      </div>
      
      <div class="md:col-span-2 pt-2">
        <!-- Error Message -->
        <p *ngIf="password && confirmPassword && password !== confirmPassword" class="text-red-500 text-xs font-bold mb-4 flex items-center gap-2 animate-fade-in-up">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          Las contraseñas no coinciden.
        </p>

        <button 
          (click)="signup()"
          [disabled]="!email || !username || !password || password !== confirmPassword"
          class="btn-primary disabled:opacity-50 disabled:cursor-not-allowed">
          Crear Cuenta
        </button>
      </div>

      <div class="md:col-span-2 text-center mt-4">
        <p class="text-sm font-medium text-slate-500">
          ¿Ya tienes cuenta? 
          <a routerLink="/login" class="text-indigo-600 font-bold hover:underline">Inicia sesión</a>
        </p>
      </div>
    </form>
  </div>
</div>
