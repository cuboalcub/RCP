<div class="dashboard-container font-sans text-slate-900 pb-20">
    <!-- Top Navigation -->
    <nav class="fixed top-0 left-0 w-full glass-nav z-50 h-20 px-8 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-50 rounded-xl">
                <img src="https://firebasestorage.googleapis.com/v0/b/roaau-javascript.appspot.com/o/imagenes%2Fcanvas.png?alt=media&token=266cc22d-53b5-44f8-963d-0a0ab0e556cb"
                     alt="Logo" class="h-8 w-auto">
            </div>
            <h2 class="text-xl font-black tracking-tight text-slate-800 flex items-center">
                DASHBOARD
                <span class="demo-badge">DEMO</span>
            </h2>
        </div>

        <div class="flex items-center gap-4">
            <!-- User Menu -->
            <div class="relative">
                <button (click)="toggleMenu($event)"
                    class="w-10 h-10 rounded-full border-2 border-white shadow-md bg-cover bg-center ring-2 ring-indigo-100 hover:ring-indigo-300 transition-all"
                    [style.background-image]="'url(https://firebasestorage.googleapis.com/v0/b/roaau-javascript.appspot.com/o/imagenes%2Fimages-removebg-preview.png?alt=media&token=b3c8b16c-332f-49af-8048-df25b6865ef8)'"
                    aria-label="User Menu" id="userButton">
                </button>
                <div *ngIf="menuVisible" 
                  class="absolute right-0 mt-3 w-56 bg-white border border-slate-100 rounded-2xl shadow-2xl py-2 animate-fade-in-up z-[60]"
                  id="logoutMenu">
                    <div class="px-4 py-2 border-b border-slate-50 mb-1">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Account</p>
                    </div>
                    <button class="w-full text-left px-4 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-red-500 flex items-center gap-2 transition-colors"
                            (click)="logOut()">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        Sign Out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 pt-28">
        <!-- Page Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900">Mis Proyectos</h1>
                <p class="text-slate-500 font-medium">Gestiona y visualiza tus proyectos activos.</p>
            </div>
            
            <button
                class="flex items-center gap-2 px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 transition-all active:scale-95"
                (click)="gocreate()">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                Nuevo Proyecto
            </button>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-3xl border border-slate-100 card-shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100">
                            <th class="px-8 py-5 text-xs font-black text-slate-400 uppercase tracking-widest">Nombre del Proyecto</th>
                            <th class="px-8 py-5 text-xs font-black text-slate-400 uppercase tracking-widest text-center">Estado</th>
                            <th class="px-8 py-5 text-xs font-black text-slate-400 uppercase tracking-widest text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <tr *ngFor="let elemento of datosTabla" class="table-row-hover">
                            <td class="px-8 py-5">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold">
                                        {{elemento.nombre.charAt(0)}}
                                    </div>
                                    <span class="font-bold text-slate-700">{{elemento.nombre}}</span>
                                </div>
                            </td>
                            <td class="px-8 py-5 text-center">
                                <span class="status-badge bg-green-50 text-green-600">Activo</span>
                            </td>
                            <td class="px-8 py-5">
                                <div class="flex justify-end items-center gap-2">
                                    <button (click)="viewRCP(elemento.id)"
                                        class="btn-icon bg-fuchsia-50 text-fuchsia-600 hover:bg-fuchsia-100"
                                        title="Ver Detalles">
                                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                        </svg>
                                    </button>
                                    <button (click)="goEdit(elemento.id)"
                                        class="btn-icon bg-blue-50 text-blue-600 hover:bg-blue-100"
                                        title="Editar">
                                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                        </svg>
                                    </button>
                                    <button (click)="goDelete(elemento.id)"
                                        class="btn-icon bg-red-50 text-red-600 hover:bg-red-100"
                                        title="Eliminar">
                                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Empty State (if needed) -->
            <div *ngIf="datosTabla.length === 0" class="py-20 text-center">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-slate-50 rounded-full mb-4">
                    <svg class="w-10 h-10 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-slate-900">No hay proyectos aún</h3>
                <p class="text-slate-500 mb-6">Comienza creando tu primer proyecto haciendo clic en el botón.</p>
            </div>
        </div>
    </div>
</div>
