<div class="login-container hero-gradient">
  <!-- Back Button -->
  <button 
    (click)="goBack()"
    class="back-btn group"
    title="Regresar"
  >
    <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
  </button>

  <!-- Auth Card -->
  <div class="auth-card">
    <div class="flex justify-center mb-8">
      <div class="relative">
        <div class="absolute inset-0 bg-indigo-200 blur-2xl opacity-30 rounded-full animate-pulse"></div>
        <img src="/assets/app_logo_premium_1775935602760.png" 
             alt="Logo" 
             class="relative w-24 h-24 rounded-3xl object-cover border-2 border-white shadow-xl">
      </div>
    </div>

    <div class="text-center mb-8">
      <h1 class="text-3xl font-black text-slate-900 tracking-tight">Bienvenido</h1>
      <p class="text-slate-500 font-medium">Ingresa tus credenciales para continuar</p>
    </div>

    <form (submit)="goLogin()" class="space-y-5">
      <div>
        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Usuario</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </span>
          <input 
            [(ngModel)]="username" 
            name="username" 
            type="text" 
            placeholder="Introduce tu usuario" 
            class="input-field pl-12"
            required>
        </div>
      </div>
      
      <div>
        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Contraseña</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </span>
          <input 
            [(ngModel)]="password" 
            name="password" 
            type="password" 
            placeholder="••••••••" 
            class="input-field pl-12"
            required>
        </div>
      </div>
      
      <div class="pt-2">
        <button 
          type="submit" 
          class="btn-primary">
          Iniciar Sesión
        </button>
      </div>

      <div class="relative py-4">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-100"></div>
        </div>
        <div class="relative flex justify-center text-xs uppercase">
          <span class="bg-white px-3 text-slate-400 font-bold tracking-widest">O continúa con</span>
        </div>
      </div>

      <button 
        type="button"
        (click)="goSignUp()" 
        class="btn-secondary">
        Crear una cuenta
      </button>
    </form>
  </div>
</div>
