<div class="dashboard-container font-sans text-slate-900 pb-20">
    <!-- Top Navigation -->
    <nav class="fixed top-0 left-0 w-full glass-nav z-50 h-20 px-8 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button (click)="goBack()" 
                    class="btn-icon bg-slate-50 text-slate-600 hover:bg-slate-100"
                    title="Volver">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l-7-7m7 7h18" />
                </svg>
            </button>
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-50 rounded-xl">
                    <img src="/assets/app_logo_premium_1775935602760.png"
                         alt="Logo" class="h-8 w-auto">
                </div>
                <h2 class="text-xl font-black tracking-tight text-slate-800 flex items-center">
                    NUEVO PROYECTO
                    <span class="demo-badge">DEMO</span>
                </h2>
            </div>
        </div>

        <div class="flex items-center gap-4">
             <button (click)="saveData()"
                class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-95 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
                Guardar Proyecto
            </button>
        </div>
    </nav>

    <div class="container mx-auto px-6 pt-28 animate-slide-up">
        <!-- Page Header -->
        <div class="mb-10">
            <h1 class="text-3xl font-black text-slate-900">Configuración del Proyecto</h1>
            <p class="text-slate-500 font-medium">Define el nombre y las actividades para calcular la ruta crítica.</p>
        </div>

        <div class="grid grid-cols-1 gap-8">
            <!-- Project Name Card -->
            <div class="bg-white rounded-3xl border border-slate-100 card-shadow p-8">
                <label class="label-premium mb-3">Nombre del Proyecto</label>
                <input 
                    type="text" 
                    placeholder="Ej. Construcción de Puente Santa Fe" 
                    class="input-premium text-lg font-bold"
                    [(ngModel)]="proyecto.nombre"
                >
            </div>

            <!-- Activities Table Card -->
            <div class="bg-white rounded-3xl border border-slate-100 card-shadow overflow-hidden">
                <div class="p-6 border-b border-slate-50 flex items-center justify-between bg-white">
                    <h3 class="font-black text-slate-800 uppercase tracking-wider text-sm">Listado de Actividades</h3>
                    <button (click)="addRow()"
                            class="flex items-center gap-2 px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl transition-all active:scale-95 text-sm">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Agregar Fila
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100">
                                <th class="px-6 py-5 label-premium text-center w-24">ID</th>
                                <th class="px-6 py-5 label-premium text-center">Optimista (O)</th>
                                <th class="px-6 py-5 label-premium text-center">Probable (MP)</th>
                                <th class="px-6 py-5 label-premium text-center">Pesimista (P)</th>
                                <th class="px-6 py-5 label-premium text-center">PERT</th>
                                <th class="px-6 py-5 label-premium">Precedentes</th>
                                <th class="px-6 py-5 label-premium text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            <tr *ngFor="let row of proyecto.actividades | keyvalue; let i = index" class="table-row-hover">
                                <td class="px-6 py-4">
                                    <input 
                                        type="text" 
                                        [(ngModel)]="row.key"
                                        (click)="key(row.key)"
                                        (blur)="onNombreChange(row.key)"
                                        class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-center font-bold text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none"
                                    >
                                </td>
                                <td class="px-6 py-4">
                                    <input type="number" [(ngModel)]="row.value.o" class="w-full bg-white border border-slate-100 rounded-lg px-3 py-2 text-center focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                                </td>
                                <td class="px-6 py-4">
                                    <input type="number" [(ngModel)]="row.value.mp" class="w-full bg-white border border-slate-100 rounded-lg px-3 py-2 text-center focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                                </td>
                                <td class="px-6 py-4">
                                    <input type="number" [(ngModel)]="row.value.p" class="w-full bg-white border border-slate-100 rounded-lg px-3 py-2 text-center focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                                </td>
                                <td class="px-6 py-4">
                                    <div class="w-full bg-indigo-50 text-indigo-600 font-black rounded-lg px-3 py-2 text-center">
                                        {{calculatePERT(row.value, row.key)}}
                                    </div>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-1">
                                        <div *ngFor="let option of filteredActividades(row.key)" 
                                             class="flex items-center gap-1.5 px-3 py-1 rounded-full cursor-pointer transition-all border"
                                             [ngClass]="row.value.precedentes.includes(option) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-500 hover:border-indigo-300'"
                                             (click)="togglePrecedente(row.value, option)">
                                            <span class="text-xs font-bold">{{option}}</span>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex justify-end">
                                        <button (click)="removeRow(row.key)"
                                                class="btn-icon bg-red-50 text-red-500 hover:bg-red-100"
                                                title="Eliminar actividad">
                                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
